<div class="container py-5 mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark">
      <i class="bi bi-building-gear me-2 text-primary"></i>Administrare Departamente
    </h2>
    <span class="badge bg-primary rounded-pill px-3">{{ departments().length }} Total</span>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm p-4 rounded-4 shadow-hover">
        <h5 class="fw-bold mb-3">Nou Departament</h5>
        <div class="mb-3">
          <label for="deptNameInput" class="form-label small text-muted fw-bold text-uppercase">Nume Departament</label>
          <input type="text" id="deptNameInput" class="form-control border-2 shadow-none" 
                 [(ngModel)]="newDeptName" placeholder="Ex: Salubritate, Transport..."
                 title="Introduceți numele noului departament">
        </div>
        <button class="btn btn-primary w-100 py-2 fw-bold rounded-pill shadow-sm" 
                [disabled]="!newDeptName.trim() || isSubmitting" (click)="onCreate()"
                title="Adaugă departament nou">
          @if(isSubmitting) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          } @else {
            <i class="bi bi-plus-lg me-1"></i> Adaugă
          }
        </button>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
          <table class="table table-hover mb-0 align-middle">
            <thead class="bg-light">
              <tr>
                <th class="py-3 text-muted small text-uppercase">Denumire</th>
                <th class="py-3 text-center text-muted small text-uppercase">Acțiuni</th>
              </tr>
            </thead>
            <tbody>
              @for (dept of departments(); track dept.id) {
                <tr>
                  <td>
                    @if (editingId() === dept.id) {
                      <input type="text" class="form-control form-control-sm border-primary" 
                             [(ngModel)]="editName" title="Editați numele departamentului">
                    } @else {
                      <span class="fw-bold text-dark">{{ dept.name }}</span>
                    }
                  </td>

                  <td class="text-center">
                    @if (editingId() === dept.id) {
                      <button class="btn btn-sm btn-success rounded-circle me-2" (click)="saveEdit()" title="Salvează modificările">
                        <i class="bi bi-check-lg"></i>
                      </button>
                      <button class="btn btn-sm btn-secondary rounded-circle" (click)="cancelEdit()" title="Anulează editarea">
                        <i class="bi bi-x-lg"></i>
                      </button>
                    } @else {
                      <button class="btn btn-sm btn-light rounded-circle me-2" (click)="onEdit(dept)" title="Editează">
                        <i class="bi bi-pencil text-warning"></i>
                      </button>
                      <button class="btn btn-sm btn-light rounded-circle" (click)="onDelete(dept.id)" title="Șterge">
                        <i class="bi bi-trash text-danger"></i>
                      </button>
                    }
                  </td>
                </tr>
              } @empty {
                <tr>
                  <td colspan="3" class="text-center py-5">
                    <i class="bi bi-building-x fs-1 text-muted d-block mb-2"></i>
                    <p class="text-muted mb-0">Nu s-au găsit departamente.</p>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
