<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h2 class="text-primary fw-bold mb-4">
            <i class="bi bi-megaphone me-2"></i>Raportează o problemă
          </h2>
          
          <form [formGroup]="reportForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label for="issueTitle" class="form-label fw-bold">Titlu Sesizare</label>
              <input type="text" id="issueTitle" formControlName="name" 
                     class="form-control rounded-3" 
                     placeholder="Ex: Groapă în carosabil sau Gunoi depozitat ilegal"
                     title="Introduceți un titlu scurt pentru problemă">
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="catSelect" class="form-label fw-bold">Categorie</label>
                <select id="catSelect" formControlName="categoryId" 
                        class="form-select rounded-3"
                        title="Selectați categoria în care se încadrează problema">
                  <option value="">Selectează...</option>
                  @for (cat of categories(); track cat.id) {
                    <option [value]="cat.id">{{ cat.name }}</option>
                  }
                </select>
              </div>
              
              <div class="col-md-6">
                <label for="sevSelect" class="form-label fw-bold">Urgență</label>
                <select id="sevSelect" formControlName="severity" 
                        class="form-select rounded-3"
                        title="Selectați nivelul de urgență perceput">
                  <option [value]="IssueSeverity.Low">Scăzută</option>
                  <option [value]="IssueSeverity.Medium">Medie</option>
                  <option [value]="IssueSeverity.High">Ridicată</option>
                  <option [value]="IssueSeverity.Urgent">Urgență / Pericol</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label for="issueDesc" class="form-label fw-bold">Descriere Detaliată</label>
              <textarea id="issueDesc" formControlName="description" 
                        class="form-control rounded-3" rows="4" 
                        placeholder="Oferiți detalii suplimentare pentru echipa de intervenție..."
                        title="Descrieți problema în detaliu"></textarea>
            </div>

            <div class="mb-4">
              <label for="addressSearch" class="form-label fw-bold">Locație incident</label>
              
              <div class="input-group shadow-sm mb-3">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-geo-alt-fill text-danger"></i>
                </span>
                <input type="text" 
                       id="addressSearch" 
                       formControlName="address" 
                       class="form-control border-start-0 rounded-end-3" 
                       placeholder="Caută adresa sau selectează de pe hartă..."
                       title="Introduceți adresa sau selectați locația pe hartă">
              </div>

              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label fw-bold m-0 small text-muted text-uppercase">Sau selectează manual pe hartă</label>
                <button type="button" 
                        class="btn btn-sm btn-outline-primary rounded-pill px-3 shadow-sm" 
                        (click)="getUserLocation()"
                        title="Folosește locația mea actuală prin GPS">
                  <i class="bi bi-crosshair2 me-1"></i> Detectează-mă
                </button>
              </div>
              
              <div id="reportMap" style="height: 350px;" 
                   class="rounded-3 border mb-2 shadow-sm"
                   title="Faceți click pe hartă pentru a marca locația exactă">
              </div>

              @if (!reportForm.value.address) {
                <small class="text-muted d-block mt-1 italic">
                  * Selectați un punct pe hartă, folosiți GPS-ul sau căutați adresa.
                </small>
              } @else {
                <small class="text-success d-block mt-1 fw-bold pulse-opacity">
                  <i class="bi bi-check-circle-fill me-1"></i> Locație confirmată!
                </small>
              }
            </div>

            <div class="mb-4 p-3 bg-light rounded-3 border border-dashed text-center">
              <label for="fileInput" class="form-label fw-bold d-block">Încarcă Fotografie (Dovadă)</label>
              <input type="file" id="fileInput" (change)="onFileSelected($event)" 
                     class="form-control" accept="image/*"
                     title="Alegeți o imagine clară cu problema raportată">
              
              @if (imagePreview()) {
                <div class="mt-3">
                  <img [src]="imagePreview()" class="img-thumbnail rounded-3 shadow-sm" 
                       style="max-height: 250px;" 
                       alt="Previzualizare fotografie sesizare">
                </div>
              }
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow" 
                      [disabled]="isSubmitting()"
                      title="Trimite sesizarea">
                @if (isSubmitting()) {
                  <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                  Se trimite...
                } @else {
                  <i class="bi bi-send-fill me-2"></i>TRIMITE SESIZAREA
                }
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
